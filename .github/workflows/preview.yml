name: Preview (Cloudflare Pages)

on:
    workflow_run:
        workflows: ['Build and Deploy to GitHub Pages']
        types:
            - completed

concurrency:
    group: preview-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
    cancel-in-progress: true

jobs:
    deploy-preview:
        if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            deployments: write
            pull-requests: write
        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: github-pages
                  path: dist/
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ github.event.workflow_run.id }}

            - name: Extract Pages artifact
              run: tar -xvf dist/artifact.tar -C dist/ && rm dist/artifact.tar

            - name: Get PR number
              id: get-pr
              uses: actions/github-script@v9
              with:
                  script: |
                      const wr = context.payload.workflow_run;
                      const headBranch = wr.head_branch;
                      const owner = wr.head_repository?.owner?.login;
                      const qualifier = owner
                          ? `${owner}:${headBranch}`
                          : headBranch;
                      const { data: prs } = await github.rest.pulls.list({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: 'open',
                          head: qualifier,
                      });
                      if (prs.length === 0) {
                          core.setFailed('No open PR found for branch ' + headBranch);
                          return;
                      }
                      core.setOutput('pr-number', prs[0].number);

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v4
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy dist/ --project-name=frcsoftware --branch pr-${{ steps.get-pr.outputs.pr-number }}
                  gitHubToken: ${{ secrets.GITHUB_TOKEN }}

            - name: Comment PR with preview URL
              if: success()
              uses: actions/github-script@v9
              with:
                  script: |
                      const prNumber = '${{ steps.get-pr.outputs.pr-number }}';
                      if (!prNumber) {
                          core.warning('No PR number available, skipping comment');
                          return;
                      }
                      const previewUrl = `https://pr-${prNumber}.frcsoftware.pages.dev`;
                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: parseInt(prNumber),
                      });
                      const alreadyCommented = comments.some(
                          c => c.user?.type === 'Bot' && c.body?.includes(previewUrl)
                      );
                      if (!alreadyCommented) {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: parseInt(prNumber),
                              body: `🌐 Preview URL: ${previewUrl}`,
                          });
                      }
