name: Lint and Format

on:
    push:
        branches: [main]
    pull_request:

jobs:
    lint-format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm format:check
